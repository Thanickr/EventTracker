<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Event Tracker</title>

    <link rel="stylesheet" href="./style.css" />
    <link rel="manifest" href="./manifest.json" />

    <meta name="theme-color" content="#222222" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
        name="apple-mobile-web-app-title"
        content="Event Tracker"
    />
    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black"
    />
</head>

<body>
    <main class="app">
        <h1>Event Tracker</h1>
        <p class="subtitle">Log exercise quickly.</p>

        <section class="card">
            <label for="exercise-type">Exercise</label>
            <input
                id="exercise-type"
                type="text"
                value="walk"
            />

            <label for="amount">Amount</label>
            <input
                id="amount"
                type="number"
                step="0.01"
                value="1"
            />

            <label for="unit">Unit</label>
            <input
                id="unit"
                type="text"
                value="mile"
            />

            <label for="note">
                Note <span class="optional">(optional)</span>
            </label>
            <input
                id="note"
                type="text"
                placeholder="Optional note"
            />

            <button id="save-button">Save Exercise</button>

            <p id="status-message" class="status"></p>
        </section>

        <section class="card">
            <h2>Recent Events</h2>

            <div
                id="events-list"
                class="events-list"
            ></div>

            <div class="data-actions">
                <button
                    id="export-button"
                    class="secondary-button"
                    type="button"
                >
                    Export Data
                </button>

                <button
                    id="import-button"
                    class="secondary-button"
                    type="button"
                >
                    Import Data
                </button>

                <input
                    id="import-file"
                    type="file"
                    accept="application/json,.json"
                    hidden
                />

                <p
                    id="data-status-message"
                    class="status"
                ></p>
            </div>
        </section>
    </main>

    <script src="./db.js"></script>
    <script src="./app.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker
                .register("./service-worker.js")
                .catch((error) => {
                    console.error(
                        "Service worker registration failed:",
                        error
                    );
                });
        }
    </script>
</body>
</html>
