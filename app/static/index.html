<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Tracker</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <main class="app">
        <h1>Event Tracker</h1>
        <p class="subtitle">Log exercise quickly.</p>

        <section class="card">
            <label for="exercise-type">Exercise</label>
            <input id="exercise-type" type="text" value="walk" />

            <label for="amount">Amount</label>
            <input id="amount" type="number" step="0.01" value="1" />

            <label for="unit">Unit</label>
            <input id="unit" type="text" value="mile" />

            <label for="note">Note <span class="optional">(optional)</span></label>
            <input id="note" type="text" placeholder="Optional note" />

            <button id="save-button">Save Exercise</button>

            <p id="status-message" class="status"></p>
        </section>

        <section class="card">
            <h2>Recent Events</h2>
            <div id="events-list" class="events-list"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
